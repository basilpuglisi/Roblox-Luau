function switchTab(tab) {
  const path = document.getElementById("pathWrap");

  document.getElementById("refScreen").classList.remove("active");
  document.getElementById("reviewScreen").classList.remove("active");
  document.getElementById("statsScreen").classList.remove("active");
  path.classList.remove("hidden");
  document.getElementById("topbar").style.display = "flex";
  document.getElementById("bottomNav").classList.remove("hidden");

  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));

  if (tab === "path") {
    document.getElementById("navPath").classList.add("active");
    renderMap();
  } else if (tab === "ref") {
    document.getElementById("navRef").classList.add("active");
    path.classList.add("hidden");
    document.getElementById("topbar").style.display = "none";
    document.getElementById("refScreen").classList.add("active");
    renderReference();
  } else if (tab === "review") {
    document.getElementById("navReview").classList.add("active");
    path.classList.add("hidden");
    document.getElementById("topbar").style.display = "none";
    document.getElementById("reviewScreen").classList.add("active");
    renderReview();
  } else if (tab === "stats") {
    document.getElementById("navStats").classList.add("active");
    path.classList.add("hidden");
    document.getElementById("topbar").style.display = "none";
    document.getElementById("statsScreen").classList.add("active");
    renderStats();
  }
}

// ============================================================
//  REFERENCE ENGINE
// ============================================================
function renderReference(filter) {
  const body = document.getElementById("refBody");
  const query = (filter || "").toLowerCase();
  let html = "";
  let count = 0;

  REFERENCE.forEach(cat => {
    const filtered = cat.entries.filter(e =>
      !query ||
      e.term.toLowerCase().includes(query) ||
      e.desc.toLowerCase().includes(query) ||
      e.syntax.toLowerCase().includes(query)
    );
    if (filtered.length === 0) return;
    html += `<div class="ref-cat"><div class="ref-cat-title">${cat.cat}</div>`;
    filtered.forEach(e => {
      html += `<div class="ref-entry">
        <div class="ref-term">${escHtml(e.term)}</div>
        <code class="ref-syntax">${escHtml(e.syntax)}</code>
        <div class="ref-desc">${escHtml(e.desc)}</div>
      </div>`;
      count++;
    });
    html += `</div>`;
  });

  if (count === 0) {
    html = '<div class="ref-empty">No results found. Try different keywords.</div>';
  }
  body.innerHTML = html;
}

function filterRef() {
  const q = document.getElementById("refSearch").value.trim();
  renderReference(q);
}

// ============================================================
//  REVIEW ENGINE
// ============================================================
let reviewState = null;

function renderReview() {
  const screen = document.getElementById("reviewScreen");
  const mistakes = state.mistakes || [];

  if (mistakes.length === 0) {
    screen.innerHTML = `
      <div class="lesson-top">
        <button class="lesson-close" onclick="switchTab('path')">✕</button>
        <div style="flex:1"></div>
      </div>
      <div class="review-empty">
        <div class="review-empty-icon">✨</div>
        <div class="review-empty-title">Nothing to review!</div>
        <div class="review-empty-sub">Questions you get wrong will show up here for practice.</div>
      </div>`;
    return;
  }

  // Start a review session with up to 10 random missed questions (Fisher-Yates)
  const shuffled = [...mistakes];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  const reviewPool = shuffled.slice(0, 10);
  const questions = reviewPool.map(m => {
    const q = UNITS[m.ui]?.lessons[m.li]?.questions[m.qi];
    return q ? {...q, _src: m} : null;
  }).filter(Boolean);

  if (questions.length === 0) {
    screen.innerHTML = `
      <div class="lesson-top">
        <button class="lesson-close" onclick="switchTab('path')">✕</button>
        <div style="flex:1"></div>
      </div>
      <div class="review-empty">
        <div class="review-empty-icon">✨</div>
        <div class="review-empty-title">Nothing to review!</div>
        <div class="review-empty-sub">All caught up.</div>
      </div>`;
    return;
  }

  reviewState = {
    questions: questions,
    current: 0,
    correctCount: 0,
    answered: false,
    selected: null,
    total: questions.length,
  };

  screen.innerHTML = `
    <div class="lesson-top">
      <button class="lesson-close" onclick="closeReview()">✕</button>
      <div class="lesson-progress-outer"><div class="lesson-progress-inner" id="reviewProgress"></div></div>
      <div style="font-size:13px;font-weight:800;color:#CE82FF;min-width:50px;text-align:right">REVIEW</div>
    </div>
    <div class="lesson-body" id="reviewBody"></div>
    <div class="feedback-banner" id="reviewFeedback">
      <div class="fb-title" id="reviewFbTitle"></div>
      <div class="fb-explain" id="reviewFbExplain"></div>
    </div>
    <div class="lesson-bottom">
      <button class="check-btn disabled" id="reviewCheckBtn" onclick="handleReviewCheck()">Check</button>
    </div>`;

  renderReviewQuestion();
}

function renderReviewQuestion() {
  const rs = reviewState;
  if (!rs) return;
  const q = rs.questions[rs.current];
  rs.answered = false;
  rs.selected = null;

  document.getElementById("reviewProgress").style.width =
    `${(rs.current / rs.total) * 100}%`;

  const fb = document.getElementById("reviewFeedback");
  if (fb) { fb.classList.remove("show", "correct", "wrong"); }

  const btn = document.getElementById("reviewCheckBtn");
  btn.textContent = "Check";
  btn.className = "check-btn disabled";

  const body = document.getElementById("reviewBody");
  if (!body) return;

  if (q.t === "mc") {
    body.innerHTML = `
      <div class="q-sub" style="color:#CE82FF">Review Question ${rs.current + 1}/${rs.total}</div>
      <div class="q-prompt">${escHtml(q.q)}</div>
      <div class="mc-options">${q.o.map((opt, i) => `
        <button class="mc-btn" data-idx="${i}" onclick="selectReviewMC(this, ${i})">${formatOption(opt)}</button>`).join("")}
      </div>`;
  } else if (q.t === "fill") {
    const parts = q.code.split("___");
    body.innerHTML = `
      <div class="q-sub" style="color:#CE82FF">Review Question ${rs.current + 1}/${rs.total}</div>
      <div class="q-prompt">${escHtml(q.q)}</div>
      <div class="q-code-block">${escHtml(parts[0])}<span class="q-blank" id="reviewBlank">&nbsp;</span>${escHtml(parts[1] || "")}</div>
      <div class="fill-input-wrap">
        <input class="fill-input" id="reviewFillInput" type="text" placeholder="Type your answer..." autocomplete="off" autocapitalize="off" spellcheck="false">
      </div>`;
    const input = document.getElementById("reviewFillInput");
    input.addEventListener("input", () => {
      const v = input.value.trim();
      document.getElementById("reviewBlank").textContent = v || "\u00A0";
      reviewState.selected = v;
      const b = document.getElementById("reviewCheckBtn");
      b.className = v ? "check-btn ready" : "check-btn disabled";
    });
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const v = input.value.trim();
        if (v) { reviewState.selected = v; handleReviewCheck(); }
      }
    });
    setTimeout(() => input.focus(), 100);
  } else if (q.t === "order") {
    const shuffled = [...q.blocks].map((b, i) => ({text: b, origIdx: i}));
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    body.innerHTML = `
      <div class="q-sub" style="color:#CE82FF">Review Question ${rs.current + 1}/${rs.total}</div>
      <div class="q-prompt">${escHtml(q.q)}</div>
      <div class="order-answer-label">YOUR ANSWER:</div>
      <div class="order-answer" id="reviewOrderAnswer"></div>
      <div class="order-bank" id="reviewOrderBank">
        ${shuffled.map((b, i) => `<button class="block" data-orig="${b.origIdx}" onclick="pickReviewBlock(this)">${escHtml(b.text)}</button>`).join("")}
      </div>`;
    reviewState.selected = [];
  }
}

function selectReviewMC(el, idx) {
  if (reviewState.answered) return;
  document.querySelectorAll("#reviewBody .mc-btn").forEach(b => b.classList.remove("selected"));
  el.classList.add("selected");
  reviewState.selected = idx;
  document.getElementById("reviewCheckBtn").className = "check-btn ready";
}

function pickReviewBlock(el) {
  if (reviewState.answered) return;
  const rs = reviewState;
  if (el.parentElement.id === "reviewOrderAnswer") {
    el.classList.remove("in-answer");
    document.getElementById("reviewOrderBank").appendChild(el);
    rs.selected = rs.selected.filter(i => i !== parseInt(el.dataset.orig));
  } else {
    el.classList.add("in-answer");
    document.getElementById("reviewOrderAnswer").appendChild(el);
    rs.selected.push(parseInt(el.dataset.orig));
  }
  const btn = document.getElementById("reviewCheckBtn");
  btn.className = rs.selected.length === rs.questions[rs.current].blocks.length ? "check-btn ready" : "check-btn disabled";
}

function handleReviewCheck() {
  const rs = reviewState;
  if (!rs) return;
  const btn = document.getElementById("reviewCheckBtn");

  if (rs.answered) {
    rs.current++;
    if (rs.current >= rs.total) {
      finishReview();
      return;
    }
    renderReviewQuestion();
    return;
  }

  if (btn.classList.contains("disabled")) return;

  const q = rs.questions[rs.current];
  let correct = false;

  if (q.t === "mc") {
    correct = rs.selected === q.a;
    document.querySelectorAll("#reviewBody .mc-btn").forEach(b => {
      const idx = parseInt(b.dataset.idx);
      if (idx === q.a) b.classList.add("correct");
      else if (idx === rs.selected) b.classList.add("wrong");
      b.style.pointerEvents = "none";
    });
  } else if (q.t === "fill") {
    const answer = (rs.selected || "").trim();
    const expected = q.a.trim();
    correct = q.caseSensitive ? (answer === expected) : (answer === expected || answer.toLowerCase() === expected.toLowerCase());
    const input = document.getElementById("reviewFillInput");
    input.classList.add(correct ? "correct" : "wrong");
    input.disabled = true;
    if (!correct) document.getElementById("reviewBlank").textContent = expected;
  } else if (q.t === "order") {
    const expected = q.blocks.map((_, i) => i);
    correct = JSON.stringify(rs.selected) === JSON.stringify(expected);
    document.querySelectorAll("#reviewOrderAnswer .block, #reviewOrderBank .block").forEach(b => {
      b.style.pointerEvents = "none";
    });
  }

  rs.answered = true;

  document.getElementById("reviewProgress").style.width =
    `${((rs.current + 1) / rs.total) * 100}%`;

  if (correct) {
    rs.correctCount++;
    sfxCorrect();
    // Remove from mistakes if answered correctly in review
    const src = q._src;
    state.mistakes = state.mistakes.filter(m => m.key !== src.key);
    save();
  } else {
    sfxWrong();
  }

  const fb = document.getElementById("reviewFeedback");
  fb.classList.add("show", correct ? "correct" : "wrong");
  document.getElementById("reviewFbTitle").textContent = correct ? "Got it!" : "Not quite:";
  document.getElementById("reviewFbTitle").className = "fb-title " + (correct ? "correct" : "wrong");
  document.getElementById("reviewFbExplain").textContent = q.e;

  btn.textContent = "Continue";
  btn.className = "check-btn " + (correct ? "next-correct" : "next-wrong");
}

function finishReview() {
  const rs = reviewState;
  const remaining = (state.mistakes || []).length;
  const screen = document.getElementById("reviewScreen");
  screen.innerHTML = `
    <div class="review-empty">
      <div class="review-empty-icon">${rs.correctCount === rs.total ? "🏆" : "👍"}</div>
      <div class="review-empty-title">${rs.correctCount === rs.total ? "Perfect review!" : "Review complete!"}</div>
      <div class="review-empty-sub">${rs.correctCount}/${rs.total} correct. ${remaining > 0 ? remaining + " questions still in review." : "All caught up!"}</div>
      <button class="continue-btn" style="margin-top:24px" onclick="switchTab('path')">Back to Path</button>
      ${remaining > 0 ? '<button class="continue-btn" style="margin-top:10px;background:#CE82FF;box-shadow:0 5px 0 #A066CC" onclick="renderReview()">Review Again</button>' : ''}
    </div>`;
  reviewState = null;
  updateReviewBadge();
}

function closeReview() {
  reviewState = null;
  switchTab("path");
}

function updateReviewBadge() {
  const badge = document.getElementById("reviewBadge");
  const count = (state.mistakes || []).length;
  const existing = badge.querySelector(".nav-badge-dot");
  if (count > 0 && !existing) {
    badge.insertAdjacentHTML("beforeend", '<span class="nav-badge-dot"></span>');
  } else if (count === 0 && existing) {
    existing.remove();
  }
}

// ============================================================
//  STATS ENGINE
// ============================================================
function renderStats() {
  const body = document.getElementById("statsBody");
  const accuracy = state.accuracy || {};

  // Overall stats
  let totalRight = 0, totalWrong = 0;
  Object.values(accuracy).forEach(a => { totalRight += a.right; totalWrong += a.wrong; });
  const totalAnswered = totalRight + totalWrong;
  const overallPct = totalAnswered > 0 ? Math.round((totalRight / totalAnswered) * 100) : 0;
  const lessonsCompleted = Object.keys(state.completed).length;
  const mistakeCount = (state.mistakes || []).length;

  let html = `
    <div class="stats-hero">
      <div class="stats-big-num">${overallPct}%</div>
      <div class="stats-big-label">Overall Accuracy</div>
    </div>
    <div class="stats-row">
      <div class="stats-card">
        <div class="stats-card-num" style="color:#58CC02">${lessonsCompleted}</div>
        <div class="stats-card-label">Lessons Done</div>
      </div>
      <div class="stats-card">
        <div class="stats-card-num" style="color:#FFD900">${state.xp}</div>
        <div class="stats-card-label">Total XP</div>
      </div>
      <div class="stats-card">
        <div class="stats-card-num" style="color:#FF9600">🔥 ${state.streak}</div>
        <div class="stats-card-label">Day Streak</div>
      </div>
    </div>
    <div class="stats-section-title">Accuracy by Unit</div>`;

  UNITS.forEach((unit, ui) => {
    const a = accuracy[ui];
    const total = a ? a.right + a.wrong : 0;
    const pct = total > 0 ? Math.round((a.right / total) * 100) : 0;
    const color = pct >= 80 ? "#58CC02" : pct >= 50 ? "#FFD900" : pct > 0 ? "#FF4B4B" : "#2A4266";

    html += `
      <div class="stats-unit-row">
        <span class="stats-unit-name" style="color:${unit.color}">${unit.title}</span>
        <div class="stats-bar-outer">
          <div class="stats-bar-inner" style="width:${total > 0 ? pct : 0}%;background:${color}"></div>
        </div>
        <span class="stats-unit-pct" style="color:${color}">${total > 0 ? pct + "%" : "—"}</span>
      </div>`;
  });

  // Missed questions
  html += `<div class="stats-section-title stats-missed-title">Questions to Review (${mistakeCount})</div>`;

  if (mistakeCount === 0) {
    html += '<div class="stats-missed-none">No missed questions. Nice work!</div>';
  } else {
    const mistakes = state.mistakes.slice(0, 20);
    mistakes.forEach(m => {
      const unit = UNITS[m.ui];
      const lesson = unit?.lessons[m.li];
      const q = lesson?.questions[m.qi];
      if (!q || !unit || !lesson) return;
      const qText = q.q.length > 60 ? q.q.substring(0, 60) + "..." : q.q;
      html += `
        <div class="stats-missed-item">
          <div class="stats-missed-q">${escHtml(qText)}</div>
          <div class="stats-missed-from">${unit.title} → ${lesson.title}</div>
        </div>`;
    });
  }

  body.innerHTML = html;
}

// ============================================================
//  LAB ENGINE
// ============================================================
function openLab(labId) {
  const lab = LABS.find(l => l.id === labId);
  if (!lab) return;

  const posUnit = UNITS[lab.mapPosition - 1];

  document.getElementById("labScreen").classList.add("active");
  document.getElementById("topbar").style.display = "none";
  document.getElementById("bottomNav").classList.add("hidden");
  document.getElementById("labTag").textContent = "LAB";
  document.getElementById("labTag").style.background = posUnit.color;

  const labSteps = state.labs[lab.id] || {};
  const stepsCompleted = lab.steps.filter((_, si) => labSteps[si]).length;
  const allDone = stepsCompleted === lab.steps.length;

  // Build skill pills
  const skillPills = lab.usesUnits.map(unitNum => {
    const u = UNITS[unitNum - 1];
    const done = isUnitComplete(unitNum - 1);
    return `<span class="lab-skill-pill ${done ? 'done' : ''}" style="border-color:${u.color};${done ? 'background:' + u.color + '20' : ''}">
      ${done ? '✓' : '○'} Unit ${unitNum}: ${u.title}
    </span>`;
  }).join('');

  const allSkillsReady = lab.usesUnits.every(u => isUnitComplete(u - 1));

  const body = document.getElementById("labBody");
  body.innerHTML = `
    <div style="text-align:center;margin-bottom:20px">
      <div class="lab-hero-icon">${lab.icon}</div>
      <div class="lab-hero-title">${lab.title}</div>
      <div class="lab-hero-desc">${lab.desc}</div>
    </div>
    <div class="lab-skills-section">
      <div class="lab-skills-label">USES SKILLS FROM</div>
      <div class="lab-skills-pills">${skillPills}</div>
      <div class="lab-skills-note">${allSkillsReady
        ? '✅ You\'ve covered all the skills for this lab.'
        : 'You can start anytime. Unchecked units teach skills this lab uses.'}</div>
    </div>
    <div class="lab-steps-label">BUILD STEPS — ${stepsCompleted}/${lab.steps.length}</div>
    ${lab.steps.map((step, si) => {
      const isDone = !!labSteps[si];
      const detail = formatLabDetail(step.detail);
      return `
      <div class="lab-step ${isDone ? 'done' : ''}" id="labstep-${si}">
        <div class="lab-step-header" onclick="toggleLabExpand(${si})">
          <div class="lab-step-check" onclick="event.stopPropagation();toggleLabCheck('${lab.id}',${si})">${isDone ? '✓' : ''}</div>
          <span class="lab-step-num">${si + 1}</span>
          <span class="lab-step-title">${step.title}</span>
          <span class="lab-step-expand">▼</span>
        </div>
        <div class="lab-step-detail">${detail}</div>
      </div>`;
    }).join("")}
    ${allDone ? '<div class="lab-complete-msg"><div class="icon">🏆</div><div class="text">Lab complete! Nice build.</div></div>' : ''}
  `;
  body.scrollTop = 0;
}

function formatLabDetail(text) {
  // Convert code blocks (lines starting with spaces or known Luau keywords)
  const parts = text.split('\n\n');
  return parts.map(part => {
    const lines = part.split('\n');
    const isCode = lines.some(l => /^\s*(local |game\.|script\.|function |if |for |while |end|task\.)/.test(l));
    if (isCode && lines.length > 1) {
      return '<code class="lab-code-block">' + escHtml(part) + '</code>';
    }
    return '<p style="margin:4px 0">' + escHtml(part) + '</p>';
  }).join('');
}

function toggleLabExpand(stepIdx) {
  const el = document.getElementById("labstep-" + stepIdx);
  if (el) el.classList.toggle("open");
}

function toggleLabCheck(labId, stepIdx) {
  if (!state.labs[labId]) state.labs[labId] = {};
  state.labs[labId][stepIdx] = !state.labs[labId][stepIdx];
  save();
  openLab(labId); // re-render
}

function closeLab() {
  document.getElementById("labScreen").classList.remove("active");
  document.getElementById("topbar").style.display = "flex";
  document.getElementById("bottomNav").classList.remove("hidden");
  renderMap();
}

// ============================================================
function toggleSync() {
  const panel = document.getElementById("syncPanel");
  const isOpen = panel.classList.contains("active");
  if (isOpen) {
    panel.classList.remove("active");
  } else {
    // Generate export code
    const code = btoa(JSON.stringify(state));
    document.getElementById("exportCode").value = code;
    document.getElementById("importCode").value = "";
    document.getElementById("syncMsg").textContent = "";
    document.getElementById("syncMsg").className = "sync-msg";
    panel.classList.add("active");
  }
}

function copyExportCode() {
  const el = document.getElementById("exportCode");
  const code = el.value;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(code).then(() => {
      showSyncMsg("Copied to clipboard!", "ok");
    }).catch(() => {
      el.select();
      document.execCommand("copy");
      showSyncMsg("Copied! (fallback)", "ok");
    });
  } else {
    el.select();
    document.execCommand("copy");
    showSyncMsg("Copied!", "ok");
  }
}

function importProgress() {
  const raw = document.getElementById("importCode").value.trim();
  if (!raw) { showSyncMsg("Paste a code first.", "err"); return; }
  try {
    const parsed = JSON.parse(atob(raw));
    if (!parsed || typeof parsed !== "object") throw new Error("bad");
    if (!confirm("This will merge imported progress with your current progress. Continue?")) return;
    state = mergeState(state, parsed);
    save();
    renderMap();
    updateReviewBadge();
    showSyncMsg("Progress merged!", "ok");
  } catch (e) {
    showSyncMsg("Invalid code. Check and try again.", "err");
  }
}

function downloadProgress() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "luau-trainer-progress.json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showSyncMsg("File downloaded!", "ok");
}

function uploadProgress(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed || typeof parsed !== "object") throw new Error("bad");
      if (!confirm("This will merge imported progress with your current progress. Continue?")) return;
      state = mergeState(state, parsed);
      save();
      renderMap();
      updateReviewBadge();
      showSyncMsg("Progress merged from file!", "ok");
    } catch (err) {
      showSyncMsg("Invalid file. Use a Luau Trainer export.", "err");
    }
  };
  reader.readAsText(file);
  event.target.value = "";
}

function resetProgress() {
  if (!confirm("Reset all progress? This cannot be undone.")) return;
  state = normalizeState({});
  localStorage.removeItem("luau-duo-v2");
  save();
  renderMap();
  updateReviewBadge();
  showSyncMsg("Progress reset.", "ok");
}

function showSyncMsg(text, type) {
  const el = document.getElementById("syncMsg");
  el.textContent = text;
  el.className = "sync-msg " + type;
}

// ============================================================
//  HELPERS
// ============================================================
function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ============================================================
//  SPOTIFY PLAYER
// ============================================================
const DEFAULT_PLAYLIST = "37i9dQZF1DX8Uebhn9wzrS"; // chill beats
function getSpotifyId(url) {
  const m = url.match(/playlist[/:]([a-zA-Z0-9]+)/);
  return m ? m[1] : null;
}
function renderSpotifyEmbed(playlistId) {
  const el = document.getElementById("spotifyEmbed");
  el.innerHTML = `<iframe src="https://open.spotify.com/embed/playlist/${playlistId}?utm_source=generator&theme=0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    <div style="text-align:center;margin-top:8px">
      <a href="https://open.spotify.com/playlist/${playlistId}" target="_blank" rel="noopener" style="color:#1DB954;font-size:12px;font-weight:700;text-decoration:none">▶ Open in Spotify app</a>
      <div style="color:#5A7494;font-size:11px;margin-top:4px">Player not loading? Open this file in Chrome or Safari.</div>
    </div>`;
}
function toggleSpotify() {
  const panel = document.getElementById("spotifyPanel");
  const isHidden = panel.classList.contains("hidden");
  if (isHidden) {
    panel.classList.remove("hidden");
    const savedUrl = localStorage.getItem("luau-spotify-url");
    const pid = savedUrl ? getSpotifyId(savedUrl) : DEFAULT_PLAYLIST;
    renderSpotifyEmbed(pid || DEFAULT_PLAYLIST);
    if (savedUrl) document.getElementById("spotifyUrl").value = savedUrl;
  } else {
    panel.classList.add("hidden");
  }
}
function setSpotifyPlaylist() {
  const url = document.getElementById("spotifyUrl").value.trim();
  const pid = getSpotifyId(url);
  if (pid) {
    localStorage.setItem("luau-spotify-url", url);
    renderSpotifyEmbed(pid);
    sfxTap();
  }
}

// ============================================================
//  CHALLENGE ENGINE
// ============================================================
let currentChallenge = null;
function openChallenge(unitIdx) {
  const ch = CHALLENGES.find(c => c.unit === unitIdx + 1);
  if (!ch) return;
  currentChallenge = ch;
  document.documentElement.style.setProperty('--unit-color', UNITS[unitIdx].color);

  const body = document.getElementById("challengeBody");
  body.innerHTML = `
    <div class="teach-badge" style="margin-bottom:16px">💡 CHALLENGE</div>
    <div class="challenge-prompt">${escHtml(ch.prompt)}</div>
    <textarea class="challenge-textarea" placeholder="Write your code here..."></textarea>
    <div class="challenge-answer" id="challengeAnswer">
      <div class="challenge-answer-label">Model Answer</div>
      <div class="challenge-answer-code">${escHtml(ch.answer)}</div>
    </div>`;

  const btn = document.getElementById("challengeRevealBtn");
  btn.textContent = "Show Answer";
  btn.className = "check-btn ready";
  btn.onclick = revealChallenge;

  document.getElementById("challengeScreen").style.display = "flex";
  document.getElementById("topbar").style.display = "none";
  document.getElementById("bottomNav").classList.add("hidden");
}
function revealChallenge() {
  const ans = document.getElementById("challengeAnswer");
  if (ans) {
    ans.classList.add("show");
    sfxComplete();
  }
  const btn = document.getElementById("challengeRevealBtn");
  btn.textContent = "Close";
  btn.className = "check-btn next-correct";
  btn.onclick = closeChallenge;
}
function closeChallenge() {
  document.getElementById("challengeScreen").style.display = "none";
  document.getElementById("topbar").style.display = "flex";
  document.getElementById("bottomNav").classList.remove("hidden");
  currentChallenge = null;
}

// ============================================================
//  INIT
// ============================================================
load();
renderMap();
updateReviewBadge();
</script>
