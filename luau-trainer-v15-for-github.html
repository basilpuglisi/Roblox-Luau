<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luau Trainer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--unit-color:#58CC02;--unit-glow:#58CC0250;--unit-tint:#58CC0218}
.hidden{display:none!important}
body{background:#0D1B2A;background:linear-gradient(170deg,#0D1B2A 0%,#0F2137 40%,#111D35 70%,#0D1B2A 100%);color:#fff;font-family:'Nunito','Avenir Next','Avenir','Segoe UI','Helvetica Neue',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
.app{max-width:500px;margin:0 auto;position:relative;min-height:100vh}

/* ===== TOP BAR ===== */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;position:sticky;top:0;background:linear-gradient(180deg,#0D1B2A,#0D1B2Ae0);z-index:100;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.stat{display:flex;align-items:center;gap:4px;font-size:14px;font-weight:800}
.stat-fire{color:#FF9600}
.stat-xp{color:#FFD900}
.streak-num,.xp-num{min-width:20px}

/* ===== PATH MAP ===== */
.path-wrap{padding:20px 16px 100px;position:relative}
.unit-header{text-align:center;margin:30px 0 20px;position:relative}
.unit-header:first-child{margin-top:10px}
.unit-badge{display:inline-block;padding:10px 24px;border-radius:14px;font-size:16px;font-weight:900;letter-spacing:1px;color:#fff;box-shadow:0 4px 15px rgba(0,0,0,0.3)}
.unit-sub{font-size:12px;font-weight:700;color:#8899B0;margin-top:4px}
.path-nodes{display:flex;flex-direction:column;align-items:center;gap:8px;position:relative}
.node-row{width:100%;display:flex;justify-content:center;position:relative}
.node{width:66px;height:66px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;cursor:pointer;border:none;position:relative;transition:transform 0.15s,box-shadow 0.2s;box-shadow:0 6px 0 rgba(0,0,0,0.3),0 0 12px rgba(0,0,0,0.2)}
.node:active{transform:scale(0.92);box-shadow:0 2px 0 rgba(0,0,0,0.3)}
.node-locked{background:#1E2D45;color:#4A6080;cursor:default;box-shadow:0 6px 0 #1A3050}
.node-locked:active{transform:none;box-shadow:0 6px 0 #1A3050}
.node-current{animation:pulse 2s infinite}
.node-done{opacity:0.9}
.node .lock-icon{font-size:18px}
.node-check{position:absolute;bottom:-4px;right:-4px;width:22px;height:22px;border-radius:50%;background:#0D1B2A;display:flex;align-items:center;justify-content:center;font-size:12px}
.path-line{width:3px;height:16px;background:#283F68;margin:0 auto}

@keyframes pulse{0%,100%{box-shadow:0 6px 0 rgba(0,0,0,0.3),0 0 0 0 rgba(88,204,2,0.4)}50%{box-shadow:0 6px 0 rgba(0,0,0,0.3),0 0 0 10px rgba(88,204,2,0)}}

/* ===== LESSON SCREEN ===== */
.lesson-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:#0D1B2A;z-index:200;display:none;flex-direction:column;border-top:3px solid var(--unit-color)}
.lesson-screen.active{display:flex}
.lesson-top{display:flex;align-items:center;gap:12px;padding:12px 16px}
.lesson-close{background:none;border:none;color:#7088A0;font-size:24px;cursor:pointer;padding:4px}
.lesson-progress-outer{flex:1;height:14px;background:#152D50;border-radius:7px;overflow:hidden;border:1px solid #283F68}
.lesson-progress-inner{height:100%;background:var(--unit-color);border-radius:7px;transition:width 0.4s ease}
.lesson-hearts{display:flex;gap:2px;font-size:18px;min-width:60px;justify-content:flex-end}

.lesson-body{flex:1;display:flex;flex-direction:column;padding:20px 20px 0;overflow-y:auto}
.q-prompt{font-size:22px;font-weight:800;line-height:1.35;margin-bottom:20px;color:#fff}
.q-sub{font-size:15px;font-weight:700;color:#AFAFBF;margin-bottom:16px}
.q-code-block{background:#0A1830;border-radius:12px;padding:16px;font-family:'Courier New',monospace;font-size:15px;line-height:1.7;margin-bottom:20px;color:#E5E5E5;white-space:pre-wrap;border:1.5px solid #283F68;border-left:4px solid var(--unit-color)}
.q-blank{display:inline-block;min-width:80px;border-bottom:3px solid var(--unit-color);color:var(--unit-color);font-weight:800;text-align:center;padding:0 4px}

/* MC Options */
.mc-options{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.mc-btn{padding:16px 18px;border:2px solid #334E78;border-left:4px solid var(--unit-color);border-radius:16px;background:#152D50;color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;text-align:left;transition:all 0.2s;line-height:1.4}
.mc-btn:active{transform:scale(0.98)}
.mc-btn.selected{border-color:var(--unit-color);background:var(--unit-tint);box-shadow:0 0 18px var(--unit-glow)}
.mc-btn.correct{border-color:#58CC02;border-left-color:#58CC02;background:#1A3D2A;color:#7FE040;box-shadow:0 0 18px #58CC0240}
.mc-btn.wrong{border-color:#FF4B4B;border-left-color:#FF4B4B;background:#3D1A1A;color:#FF6B6B;box-shadow:0 0 18px #FF4B4B40}
.mc-btn code{font-family:'Courier New',monospace;background:#0A1628;padding:2px 6px;border-radius:4px;font-size:14px}

/* Fill input */
.fill-input-wrap{margin-bottom:20px}
.fill-input{width:100%;padding:16px;border:2px solid #334E78;border-radius:16px;background:#152D50;color:#fff;font-family:'Courier New',monospace;font-size:16px;font-weight:700;outline:none;transition:border-color 0.2s,box-shadow 0.2s}
.fill-input:focus{border-color:var(--unit-color);box-shadow:0 0 16px var(--unit-glow)}
.fill-input.correct{border-color:#58CC02;color:#7FE040;box-shadow:0 0 16px #58CC0240}
.fill-input.wrong{border-color:#FF4B4B;color:#FF6B6B;box-shadow:0 0 16px #FF4B4B40}

/* Order blocks */
.order-bank{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;min-height:50px;padding:12px;background:#0F2240;border-radius:16px;border:2px dashed #334E78}
.order-answer{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;min-height:54px;padding:12px;background:#0A1830;border-radius:16px;border:2px solid #334E78}
.order-answer-label{font-size:12px;font-weight:700;color:#7088A0;margin-bottom:6px}
.block{padding:10px 16px;border-radius:12px;background:#1A3860;color:#fff;font-family:'Courier New',monospace;font-size:14px;font-weight:700;cursor:pointer;border:2px solid #3366AA;transition:all 0.15s;user-select:none}
.block:active{transform:scale(0.94)}
.block.used{opacity:0.3;cursor:default}
.block.in-answer{background:var(--unit-tint);border-color:var(--unit-color);box-shadow:0 0 10px var(--unit-glow)}

/* Bottom bar */
.lesson-bottom{padding:16px 20px 28px;background:#0A1525;border-top:1px solid #1C3050}
.check-btn{width:100%;padding:18px;border:none;border-radius:16px;font-family:inherit;font-size:17px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:all 0.2s}
.check-btn:active{transform:scale(0.97)}
.check-btn.ready{background:var(--unit-color);color:#fff;box-shadow:0 5px 0 rgba(0,0,0,0.3),0 0 20px var(--unit-glow)}
.check-btn.disabled{background:#1A3050;color:#4A6585;cursor:default;box-shadow:0 5px 0 #0F2030}
.check-btn.next-correct{background:linear-gradient(135deg,#58CC02,#46B800);color:#fff;box-shadow:0 5px 0 #3A9600,0 0 16px #58CC0230}
.check-btn.next-wrong{background:linear-gradient(135deg,#FF4B4B,#E03E3E);color:#fff;box-shadow:0 5px 0 #CC3030,0 0 16px #FF4B4B30}

/* Feedback banner */
.feedback-banner{padding:16px 20px;display:none;border-radius:0}
.feedback-banner.show{display:block}
.feedback-banner.correct{background:linear-gradient(135deg,#1B3A1B,#1A4020)}
.feedback-banner.wrong{background:linear-gradient(135deg,#3A1B1B,#401A1A)}
.fb-title{font-size:18px;font-weight:800;margin-bottom:4px}
.fb-title.correct{color:#58CC02}
.fb-title.wrong{color:#FF4B4B}
.fb-explain{font-size:14px;color:#AFAFBF;line-height:1.5}

/* ===== COMPLETE SCREEN ===== */
.complete-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(170deg,#0D1B2A 0%,#102040 50%,#0D1B2A 100%);z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
.complete-screen.active{display:flex}
.complete-icon{font-size:80px;margin-bottom:20px;animation:bounceIn 0.6s}
.complete-title{font-size:28px;font-weight:900;color:#FFD900;margin-bottom:8px;text-shadow:0 0 20px #FFD90040}
.complete-sub{font-size:16px;color:#AFAFBF;margin-bottom:30px}
.xp-earned{font-size:42px;font-weight:900;color:#FFD900;margin-bottom:6px;text-shadow:0 0 24px #FFD90050}
.xp-label{font-size:14px;font-weight:700;color:#7088A0;margin-bottom:30px;text-transform:uppercase;letter-spacing:2px}
.complete-stats{display:flex;gap:24px;margin-bottom:40px}
.c-stat{text-align:center}
.c-stat-val{font-size:24px;font-weight:900}
.c-stat-lbl{font-size:11px;font-weight:700;color:#7088A0;text-transform:uppercase;letter-spacing:1px}
.continue-btn{padding:18px 60px;background:linear-gradient(135deg,#58CC02,#46B800);color:#fff;border:none;border-radius:16px;font-family:inherit;font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 5px 0 #3A9600,0 0 20px #58CC0230;text-transform:uppercase;letter-spacing:1px}
.continue-btn:active{transform:scale(0.97)}

/* Fail screen */
.fail-title{color:#FF4B4B}
.fail-icon{font-size:80px;margin-bottom:20px}

/* ===== CONFETTI ===== */
.confetti-wrap{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:400}
.confetti{position:absolute;width:10px;height:10px;border-radius:2px;animation:confettiFall 1.5s ease-out forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}

/* ===== SYNC PANEL ===== */
.sync-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;opacity:0.6;transition:opacity 0.15s}
.sync-btn:hover{opacity:1}
.sync-panel{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:150;display:none;align-items:center;justify-content:center;padding:20px}
.sync-panel.active{display:flex}
.sync-card{background:linear-gradient(170deg,#142136,#18294a);border-radius:20px;padding:24px 20px;max-width:420px;width:100%;max-height:90vh;overflow-y:auto;border:1px solid #1C3050}
.sync-title{font-size:20px;font-weight:900;color:#fff;margin-bottom:2px}
.sync-sub{font-size:13px;color:#7088A0;margin-bottom:20px}
.sync-section{margin-bottom:4px}
.sync-label{font-size:11px;font-weight:800;color:#7088A0;letter-spacing:2px;margin-bottom:6px;text-transform:uppercase}
.sync-desc{font-size:13px;color:#AFAFBF;margin-bottom:8px;line-height:1.4}
.sync-code-row{display:flex;gap:8px;align-items:stretch}
.sync-code{flex:1;padding:10px;border:2px solid #2A4266;border-radius:10px;background:#0A1628;color:#58CC02;font-family:'Courier New',monospace;font-size:11px;resize:none;outline:none;word-break:break-all}
.sync-code:focus{border-color:#1CB0F6}
.sync-action-btn{padding:10px 14px;border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.export-btn{background:#1CB0F6;color:#fff}
.import-btn{background:#58CC02;color:#fff}
.sync-action-btn:active{transform:scale(0.95)}
.sync-msg{font-size:12px;margin-top:6px;font-weight:700;min-height:18px}
.sync-msg.ok{color:#58CC02}
.sync-msg.err{color:#FF4B4B}
.sync-divider{height:1px;background:#1C3050;margin:16px 0}
.sync-file-row{display:flex;gap:8px}
.sync-file-btn{flex:1;padding:12px;border:2px solid #2A4266;border-radius:10px;background:transparent;color:#AFAFBF;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.15s}
.sync-file-btn:hover{border-color:#1CB0F6;color:#fff}
.sync-file-btn:active{transform:scale(0.95)}
.sync-reset-btn{width:100%;padding:12px;border:2px solid #FF4B4B30;border-radius:10px;background:transparent;color:#FF4B4B;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px}
.sync-reset-btn:hover{background:#FF4B4B15;border-color:#FF4B4B}
.sync-close-btn{width:100%;padding:12px;border:none;border-radius:10px;background:#2A4266;color:#fff;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer}
.sync-close-btn:active{transform:scale(0.97)}

/* ===== LAB NODES ===== */
.lab-row{width:100%;display:flex;justify-content:center;margin:12px 0}
.lab-node{width:auto;padding:12px 22px;border-radius:16px;display:flex;align-items:center;gap:10px;cursor:pointer;border:2px dashed;font-size:14px;font-weight:800;transition:all 0.2s;background:linear-gradient(135deg,#0D1B2A,#142136)}
.lab-node:active{transform:scale(0.95)}
.lab-node.unlocked{border-style:solid;box-shadow:0 0 12px rgba(0,0,0,0.2)}
.lab-node .lab-icon{font-size:20px}
.lab-node .lab-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;opacity:0.6}
.lab-node .lab-title{font-size:14px}
.lab-node .lab-progress{font-size:11px;opacity:0.7;margin-left:auto}
.lab-badge{display:inline-block;font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;background:#FFD90030;color:#FFD900;letter-spacing:1px;margin-left:4px}

/* ===== LAB DETAIL SCREEN ===== */
.lab-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:#0D1B2A;z-index:200;display:none;flex-direction:column}
.lab-screen.active{display:flex}
.lab-top{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #1C3050}
.lab-close{background:none;border:none;color:#7088A0;font-size:24px;cursor:pointer;padding:4px}
.lab-unit-tag{font-size:11px;font-weight:800;padding:3px 10px;border-radius:6px;letter-spacing:1px}
.lab-body{flex:1;overflow-y:auto;padding:20px 16px 40px}
.lab-hero-icon{font-size:48px;margin-bottom:12px}
.lab-hero-title{font-size:24px;font-weight:900;color:#fff;margin-bottom:6px}
.lab-hero-desc{font-size:14px;color:#AFAFBF;line-height:1.6;margin-bottom:24px}
.lab-steps-label{font-size:11px;font-weight:800;color:#7088A0;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.lab-step{border:2px solid #1C3050;border-radius:14px;margin-bottom:10px;overflow:hidden;transition:border-color 0.2s}
.lab-step.done{border-color:#58CC0260}
.lab-step-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer}
.lab-step-check{width:28px;height:28px;border-radius:8px;border:2px solid #2A4266;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.15s;flex-shrink:0}
.lab-step.done .lab-step-check{background:#58CC02;border-color:#58CC02;color:#fff}
.lab-step-num{font-size:12px;font-weight:800;color:#7088A0;min-width:16px}
.lab-step-title{font-size:15px;font-weight:700;color:#fff;flex:1}
.lab-step.done .lab-step-title{color:#AFAFBF}
.lab-step-expand{color:#7088A0;font-size:16px;transition:transform 0.2s}
.lab-step-detail{display:none;padding:0 16px 16px 56px;font-size:13px;line-height:1.7;color:#AFAFBF;white-space:pre-wrap}
.lab-step.open .lab-step-detail{display:block}
.lab-step.open .lab-step-expand{transform:rotate(180deg)}
.lab-step-detail code,.lab-code-block{display:block;background:#0A1628;border:1px solid #1C3050;border-radius:8px;padding:12px;margin:8px 0;font-family:'Courier New',monospace;font-size:12px;color:#58CC02;white-space:pre-wrap;line-height:1.6;overflow-x:auto}
.lab-complete-msg{text-align:center;padding:20px;margin-top:10px}
.lab-complete-msg .icon{font-size:36px}
.lab-complete-msg .text{font-size:14px;color:#58CC02;font-weight:700;margin-top:6px}
.lab-ready-tag{font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;background:#58CC0225;color:#58CC02;letter-spacing:1px}
.lab-skill-tag{font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;background:#FFD90020;color:#FFD900;letter-spacing:1px}
.lab-skills-section{background:#142136;border-radius:14px;padding:16px;margin-bottom:20px}
.lab-skills-label{font-size:11px;font-weight:800;color:#7088A0;letter-spacing:2px;margin-bottom:10px;text-transform:uppercase}
.lab-skills-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.lab-skill-pill{font-size:12px;font-weight:700;padding:6px 10px;border-radius:8px;border:1.5px solid;color:#AFAFBF;background:transparent;transition:all 0.15s}
.lab-skill-pill.done{color:#fff}
.lab-skills-note{font-size:12px;color:#7088A0;line-height:1.5;font-style:italic}

/* ===== BOTTOM NAV ===== */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(180deg,#142136,#0F1A2E);border-top:1px solid #1C3050;display:flex;justify-content:center;z-index:90;padding:0 0 env(safe-area-inset-bottom)}
.nav-inner{display:flex;max-width:500px;width:100%;justify-content:space-around}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:12px 0 10px;background:none;border:none;color:#4A6080;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px}
.nav-btn.active{color:#58CC02;text-shadow:0 0 8px #58CC0240}
.nav-btn .nav-icon{font-size:24px;transition:transform 0.2s}
.nav-btn.active .nav-icon{transform:scale(1.1)}
.nav-btn .nav-badge{position:relative}
.nav-badge-dot{position:absolute;top:-2px;right:-8px;width:8px;height:8px;border-radius:50%;background:#FF4B4B}

/* Adjust path padding for bottom nav */
.path-wrap{padding-bottom:140px !important}

/* ===== REFERENCE SCREEN ===== */
.ref-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:#0D1B2A;z-index:200;display:none;flex-direction:column}
.ref-screen.active{display:flex}
.ref-top{padding:12px 16px;border-bottom:1px solid #1C3050}
.ref-title{font-size:18px;font-weight:900;color:#fff;margin-bottom:10px}
.ref-search{width:100%;padding:12px 14px;border:2px solid #2A4266;border-radius:12px;background:#142136;color:#fff;font-family:inherit;font-size:14px;outline:none}
.ref-search:focus{border-color:#1CB0F6}
.ref-search::placeholder{color:#5A7494}
.ref-body{flex:1;overflow-y:auto;padding:12px 16px 80px}
.ref-cat{margin-bottom:20px}
.ref-cat-title{font-size:12px;font-weight:800;color:#7088A0;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #1C3050}
.ref-entry{background:linear-gradient(135deg,#142136,#16243d);border-radius:14px;padding:14px;margin-bottom:8px;border:1px solid #1C3050}
.ref-term{font-size:15px;font-weight:800;color:#fff;margin-bottom:4px}
.ref-syntax{font-family:'Courier New',monospace;font-size:12px;color:#58CC02;background:#0A1628;padding:8px 10px;border-radius:6px;margin:6px 0;display:block;white-space:pre-wrap;line-height:1.5}
.ref-desc{font-size:13px;color:#AFAFBF;line-height:1.5}
.ref-empty{text-align:center;padding:40px 20px;color:#5A7494;font-size:14px}
.ref-back{background:none;border:none;color:#7088A0;font-size:24px;cursor:pointer;padding:4px;position:absolute;right:16px;top:14px}

/* ===== REVIEW SCREEN ===== */
.review-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:#0D1B2A;z-index:200;display:none;flex-direction:column}
.review-screen.active{display:flex}
.review-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
.review-empty-icon{font-size:64px;margin-bottom:16px}
.review-empty-title{font-size:20px;font-weight:900;color:#fff;margin-bottom:6px}
.review-empty-sub{font-size:14px;color:#7088A0;line-height:1.5}

/* ===== STATS SCREEN ===== */
.stats-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:#0D1B2A;z-index:200;display:none;flex-direction:column}
.stats-screen.active{display:flex}
.stats-top{padding:12px 16px;border-bottom:1px solid #1C3050;display:flex;align-items:center;justify-content:space-between}
.stats-title{font-size:18px;font-weight:900;color:#fff}
.stats-back{background:none;border:none;color:#7088A0;font-size:24px;cursor:pointer;padding:4px}
.stats-body{flex:1;overflow-y:auto;padding:16px 16px 80px}
.stats-hero{text-align:center;margin-bottom:24px}
.stats-big-num{font-size:48px;font-weight:900;color:#58CC02;text-shadow:0 0 20px #58CC0230}

// ============================================================
//  SOUND SYSTEM — Web Audio API, no external files
// ============================================================
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, duration, type, vol, delay) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || "sine";
    osc.frequency.value = freq;
    gain.gain.value = vol || 0.15;
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (delay || 0) + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime + (delay || 0));
    osc.stop(ctx.currentTime + (delay || 0) + duration);
  } catch(e) {}
}
function sfxCorrect() {
  playTone(523, 0.12, "sine", 0.13, 0);
  playTone(784, 0.18, "sine", 0.13, 0.1);
}
function sfxWrong() {
  playTone(200, 0.25, "triangle", 0.12, 0);
  playTone(160, 0.3, "triangle", 0.10, 0.12);
}
function sfxComplete() {
  playTone(523, 0.12, "sine", 0.12, 0);
  playTone(659, 0.12, "sine", 0.12, 0.1);
  playTone(784, 0.15, "sine", 0.12, 0.2);
  playTone(1047, 0.3, "sine", 0.15, 0.3);
}
function sfxTap() {
  playTone(880, 0.05, "sine", 0.06, 0);
}
function sfxXP() {
  playTone(1200, 0.08, "sine", 0.08, 0);
  playTone(1500, 0.08, "sine", 0.08, 0.07);
  playTone(1800, 0.12, "sine", 0.10, 0.14);
}

const CHALLENGES = [
  {unit:1, title:"Variable Challenge", prompt:"A player joins your game with 100 health, 0 coins, and the name stored in a variable. They pick up a coin worth 25. Write the variables and update the coin count.", answer:'local playerName = "Lucas"\nlocal health = 100\nlocal coins = 0\n\n-- Player picks up a coin\ncoins += 25\nprint(`{playerName} has {coins} coins`)'},

  {unit:3, title:"Loop Challenge", prompt:"Spawn 5 platforms in a row, each 10 studs apart. Then count down from 3 to 1 and print 'Go!' at the end.", answer:'-- Spawn 5 platforms\nfor i = 1, 5 do\n  local pos = i * 10\n  print(`Platform {i} at position {pos}`)\nend\n\n-- Countdown\nfor i = 3, 1, -1 do\n  print(i)\n  task.wait(1)\nend\nprint("Go!")'},
  {unit:4, title:"Function Challenge", prompt:"Write a function called calculateDamage that takes attackPower and armorRating as parameters, subtracts armor from attack (minimum 1 damage), and returns the result. Call it with 30 attack and 12 armor.", answer:'local function calculateDamage(attack, armor)\n  local dmg = attack - armor\n  if dmg < 1 then\n    dmg = 1\n  end\n  return dmg\nend\n\nlocal result = calculateDamage(30, 12)\nprint(`Damage dealt: {result}`) -- 18'},
  {unit:5, title:"Table Challenge", prompt:"Create a shop with 3 items, each having a name, price, and rarity. Then loop through the shop and print each item in the format: 'Sword (Rare) - 100 coins'", answer:'local shop = {\n  {name = "Sword", price = 100, rarity = "Rare"},\n  {name = "Shield", price = 75, rarity = "Common"},\n  {name = "Potion", price = 25, rarity = "Common"}\n}\n\nfor i, item in shop do\n  print(`{item.name} ({item.rarity}) - {item.price} coins`)\nend'},
  {unit:6, title:"Objects Challenge", prompt:"Write code that creates a glowing Part in the workspace: bright yellow, anchored, 4x1x4 studs, with a PointLight inside it. Use create-configure-parent order.", answer:'local part = Instance.new("Part")\npart.Name = "GlowBlock"\npart.Size = Vector3.new(4, 1, 4)\npart.BrickColor = BrickColor.new("Bright yellow")\npart.Anchored = true\npart.Material = Enum.Material.Neon\n\nlocal light = Instance.new("PointLight")\nlight.Brightness = 2\nlight.Range = 20\nlight.Parent = part\n\npart.Parent = workspace'},
  {unit:7, title:"Events Challenge", prompt:"Write a trap Part script: when a player touches it, check for a Humanoid, set their health to 0, then disconnect the event so it only works once.", answer:'local trap = script.Parent\n\nlocal conn\nconn = trap.Touched:Connect(function(hit)\n  local hum = hit.Parent:FindFirstChild("Humanoid")\n  if hum then\n    hum.Health = 0\n    conn:Disconnect()\n  end\nend)'},
  {unit:8, title:"UI Challenge", prompt:"Create a TextButton that says 'Click Me!' centered on screen. When clicked, change the text to 'Clicked!' and tween it to the right side of the screen over 0.5 seconds.", answer:'local btn = Instance.new("TextButton")\nbtn.Text = "Click Me!"\nbtn.Size = UDim2.new(0, 200, 0, 50)\nbtn.Position = UDim2.new(0.5, 0, 0.5, 0)\nbtn.AnchorPoint = Vector2.new(0.5, 0.5)\nbtn.Parent = screenGui\n\nlocal TweenService = game:GetService("TweenService")\n\nbtn.MouseButton1Click:Connect(function()\n  btn.Text = "Clicked!"\n  local tween = TweenService:Create(\n    btn, TweenInfo.new(0.5),\n    {Position = UDim2.new(0.9, 0, 0.5, 0)}\n  )\n  tween:Play()\nend)'},
  {unit:9, title:"Client-Server Challenge", prompt:"A player clicks a 'Buy Sword' button. Write BOTH the client code (fires the RemoteEvent) and the server code (validates the purchase: checks type, checks if item exists in shop table, checks if player has enough coins).", answer:'-- CLIENT (LocalScript)\nlocal remote = game.ReplicatedStorage:WaitForChild("BuyItem")\n\nbuyButton.MouseButton1Click:Connect(function()\n  remote:FireServer("Sword")\nend)\n\n-- SERVER (Script)\nlocal prices = {Sword = 100, Shield = 75}\n\nremote.OnServerEvent:Connect(function(player, itemName)\n  if typeof(itemName) ~= "string" then return end\n  if not prices[itemName] then return end\n  if playerCoins[player] < prices[itemName] then return end\n  playerCoins[player] -= prices[itemName]\n  print(`{player.Name} bought {itemName}`)\nend)'},
  {unit:10, title:"Systems Challenge", prompt:"Write a ModuleScript that manages player data: a .new() constructor that creates a player record with name, coins, and level. Add a :addCoins() method and a :save() method that uses DataStoreService with pcall.", answer:'-- ModuleScript: PlayerData\nlocal DSS = game:GetService("DataStoreService")\nlocal store = DSS:GetDataStore("PlayerData")\n\nlocal PlayerData = {}\nPlayerData.__index = PlayerData\n\nfunction PlayerData.new(player)\n  local self = setmetatable({}, PlayerData)\n  self.player = player\n  self.coins = 0\n  self.level = 1\n  return self\nend\n\nfunction PlayerData:addCoins(amount)\n  self.coins += amount\nend\n\nfunction PlayerData:save()\n  local ok, err = pcall(function()\n    store:SetAsync(self.player.UserId, {\n      coins = self.coins,\n      level = self.level\n    })\n  end)\n  if not ok then warn("Save failed:", err) end\nend\n\nreturn PlayerData'},

    {t:"teach",title:"Compound Assignment",body:"Games update values constantly. Coins go up, health goes down. Luau has a shortcut: instead of writing coins = coins + 10, write coins += 10. Both do the same thing. The shortcut works with all math operators: +=, -=, *=, /=.",code:'local damage = 25\nlocal armor = 10\nlocal actual = damage - armor  -- 15\n\nlocal coins = 0\ncoins += 10   -- coins is now 10\ncoins += 5    -- coins is now 15'},

    {t:"teach",title:"String Interpolation",body:"Luau has a modern way to build strings: backtick interpolation. Wrap your string in backticks (`) and put variables inside curly braces. This is cleaner than chaining .. operators, especially with multiple variables.",code:'-- Old way: concatenation\nlocal msg = playerName .. " found a " .. itemName\n\n-- Modern way: interpolation\nlocal msg = `{playerName} found a {itemName}!`\n\n-- Both produce the same result'},

    {t:"teach",title:"How If Statements Work",body:"An if statement checks a condition. If the condition is true, the code inside runs. If false, the code is skipped. Every if statement ends with 'end'. The keyword 'then' goes right after the condition.\n\nYou'll use if statements to check player health in the Kill Brick Obby lab.",code:'local health = 0\n\nif health == 0 then\n  print("Game Over")\nend'},

    {t:"teach",title:"If / Else in a Shop",body:"The if block runs when the condition is true. The else block runs when it's false. One condition, two paths, every time.\n\nYou'll use if/else logic for kill brick checks in the Kill Brick Obby lab.",code:'local coins = 30\nlocal price = 50\n\nif coins >= price then\n  print("Purchased!")\nelse\n  print("Not enough coins")\nend'},

    {t:"teach",title:"The Key Rule: Update Your Variable",body:"If you forget to change the variable the condition checks, the loop never ends and the game freezes. Always update the variable inside the loop.\n\nYou'll use while loops for timed coin spawning in the Coin Collector lab.",code:'local fuel = 5\n\nwhile fuel > 0 do\n  print(`Fuel: {fuel}`)\n  fuel -= 1\n  task.wait(1)\nend\nprint("Out of fuel!")'},

  "4-4":[
    {t:"teach",title:"Tables Inside Tables",body:"A shop has items. Each item has a name, a price, and a rarity. That's a table inside a table: the outer table is the shop list, each inner table is one item's data."},
    {t:"teach",title:"Nested Access",body:"shop[1] gets the first item table. shop[1].price gets that item's price. This is how real game data is structured: lists of objects, each object with named properties.\n\nYou'll build the full shop data structure for the Item Shop lab.",code:'local shop = {\n  {name = "Sword", price = 100, rarity = "Common"},\n  {name = "Shield", price = 75, rarity = "Rare"}\n}\n\nprint(shop[1].name)   -- Sword\nprint(shop[2].price)  -- 75'},

  // ========== UNIT 6: ROBLOX OBJECTS ==========
  "5-0":[
    {t:"teach",title:"Everything Is an Object",body:"Every Part, every Player, every Sound in a Roblox game is an object organized into services. Players, Workspace, Lighting, ReplicatedStorage are all services. You access them with game:GetService()."},
    {t:"teach",title:"The GetService Pattern",body:"This one line is the starting point for almost everything in Roblox scripting. Memorize it. The string inside the quotes must match the service name exactly.\n\nYou'll access services to build the Tycoon Dropper lab.",code:'local Players = game:GetService("Players")\nlocal RS = game:GetService("ReplicatedStorage")\nlocal SSS = game:GetService("ServerScriptService")'},
  ],
  "5-1":[
    {t:"teach",title:"Creating Parts with Code",body:"A dropper that creates a new Part every 2 seconds. The Part falls, the player collects it, earns coins. Instance.new() creates any Roblox object: Parts, Sounds, GUIs, RemoteEvents, anything."},
    {t:"teach",title:"Create-Configure-Parent",body:"Always set properties before setting Parent. If you parent first, the object appears with default properties for a split second before your settings apply. Create, configure, then parent.\n\nYou'll spawn dropper parts in the Tycoon Dropper lab.",code:'local part = Instance.new("Part")\npart.Name = "DropperBlock"\npart.Size = Vector3.new(2, 2, 2)\npart.Anchored = false\npart.Parent = workspace  -- NOW it appears'},
  ],
  "5-2":[
    {t:"teach",title:"Safe Object Lookups",body:"You want to check if a door exists before trying to open it. If you write workspace.Door and the door doesn't exist, the script crashes. FindFirstChild returns the object if found or nil if missing. No crash."},
    {t:"teach",title:"FindFirstChild vs Direct Access",body:"workspace.Door crashes if Door doesn't exist. workspace:FindFirstChild('Door') returns nil, which you can check with an if statement. Safer code means fewer crashes in production.\n\nYou'll use FindFirstChild to locate objects in the Tycoon Dropper lab.",code:'local door = workspace:FindFirstChild("Door")\n\nif door then\n  print("Door found!")\n  door.Transparency = 1  -- make it invisible\nelse\n  print("No door in workspace")\nend'},
  ],
  "5-3":[
    {t:"teach",title:"Controlling Object Properties",body:"Every Roblox object has properties. A Part has Position, Size, Color, Anchored, Transparency, CanCollide. You read and write them with dot notation, just like dictionary keys."},
    {t:"teach",title:"Common Part Properties",body:"Anchored = true freezes a Part in the air (no gravity). Transparency goes from 0 (solid) to 1 (invisible). CanCollide = false lets things pass through.\n\nYou'll set dropper properties in the Tycoon Dropper lab.",code:'local wall = Instance.new("Part")\nwall.Anchored = true\nwall.Transparency = 0.5\nwall.CanCollide = false\nwall.BrickColor = BrickColor.new("Bright red")\nwall.Parent = workspace'},
  ],
  "5-4":[
    {t:"teach",title:"Cleaning Up Objects",body:"A coin disappears after a player touches it. A bullet disappears after 3 seconds. :Destroy() permanently removes an object and all its children from the game. Once destroyed, it's gone."},
    {t:"teach",title:"Destroy Is Permanent",body:"There is no undo. If you need the object back later, don't destroy it. Set its Parent to nil to hide it, or create a new one with Instance.new(). Use Destroy for temporary effects, projectiles, and collected items.\n\nYou'll destroy collected dropper blocks in the Tycoon Dropper lab.",code:'local coin = Instance.new("Part")\ncoin.Parent = workspace\n\ntask.wait(3)\ncoin:Destroy()\nprint("Coin removed from game")'},
  ],

  // ========== UNIT 7: EVENTS ==========
  "6-0":[
    {t:"teach",title:"Reacting Instead of Checking",body:"Instead of checking every frame whether a player touched the lava, the game tells you when it happens. That's event-driven programming. An event fires when something specific happens, and the function you connected runs automatically."},
    {t:"teach",title:"The :Connect Pattern",body:"Every event in Roblox works the same way: object.EventName:Connect(function). The function runs every time the event fires.\n\nYou'll connect touch events in the Tycoon Dropper lab.",code:'local trap = workspace:FindFirstChild("Trap")\n\ntrap.Touched:Connect(function(hit)\n  print(`{hit.Name} touched the trap!`)\nend)'},
  ],
  "6-1":[
    {t:"teach",title:"Welcoming Players",body:"When a player joins your game, you want to set up their leaderboard, load their saved data, and show a welcome message. Players.PlayerAdded fires once for every player who joins the server."},
    {t:"teach",title:"PlayerAdded Runs on the Server",body:"This event fires in server Scripts, not LocalScripts. Put your PlayerAdded script in ServerScriptService. The function receives the Player object, which has Name, UserId, and more.\n\nYou'll use PlayerAdded for setup in the Tycoon Dropper lab.",code:'local Players = game:GetService("Players")\n\nPlayers.PlayerAdded:Connect(function(player)\n  print(`{player.Name} joined the game!`)\n  -- set up leaderboard, load data here\nend)'},
  ],
  "6-2":[
    {t:"teach",title:"Reacting to Changes",body:"A player's health drops: flash the screen red. A value updates: refresh the leaderboard. The Changed event fires whenever any property on an object is modified."},
    {t:"teach",title:"Changed vs GetPropertyChangedSignal",body:"Changed fires for ANY property change. If you only care about one specific property (like Health), use GetPropertyChangedSignal('Health') instead. It's more efficient and doesn't trigger on unrelated changes.\n\nYou'll watch for property changes in the Tycoon Dropper lab.",code:'-- Fires for any property change\npart.Changed:Connect(function(propName)\n  print(`{propName} was changed`)\nend)\n\n-- More efficient: fires only for one property\nhumanoid:GetPropertyChangedSignal("Health"):Connect(function()\n  print(`Health is now {humanoid.Health}`)\nend)'},
  ],
  "6-3":[
    {t:"teach",title:"Stopping an Event",body:"A trap that fires once and then stops listening. Without disconnecting, the function runs every single time the event fires, forever. Save the connection, then call :Disconnect() when you're done."},
    {t:"teach",title:"Connect and Disconnect",body:"Always disconnect events when you no longer need them. A destroyed Part with connected events can cause memory leaks and unexpected behavior.\n\nYou'll manage event lifecycles in the Tycoon Dropper lab.",code:'local connection = trap.Touched:Connect(function(hit)\n  print("Triggered once")\n  connection:Disconnect()  -- stop listening\nend)\n\n-- The function will only run for the first touch'},
  ],
  "6-4":[
    {t:"teach",title:"The Kill Brick Pattern",body:"This is one of the most common patterns in Roblox. When something touches a Part, check if it was a player by looking for a Humanoid in the touching object's Parent. If found, set Health to 0."},
    {t:"teach",title:"hit.Parent Is the Character",body:"In a Touched event, 'hit' is the specific body part that touched (like LeftFoot). hit.Parent is the full character model. The Humanoid component lives inside the character model.\n\nYou'll build the core kill brick in the Tycoon Dropper lab.",code:'local killBrick = workspace:FindFirstChild("KillBrick")\n\nkillBrick.Touched:Connect(function(hit)\n  local humanoid = hit.Parent:FindFirstChild("Humanoid")\n  if humanoid then\n    humanoid.Health = 0\n  end\nend)'},
  ],

    {t:"teach",title:"Click Events",body:"MouseButton1Click fires when a player clicks or taps the button. The function runs on the client in a LocalScript. Change the button's text, color, or trigger actions.\n\nYou'll wire shop buttons in the Custom HUD lab.",code:'local button = script.Parent  -- TextButton\n\nbutton.MouseButton1Click:Connect(function()\n  print("Button clicked!")\n  button.Text = "Purchased!"\n  button.BackgroundColor3 = Color3.fromRGB(0, 200, 0)\nend)'},

    {t:"teach",title:"Positioning with UDim2",body:"UDim2 controls where UI elements sit on screen and how big they are. It has four values: scaleX, offsetX, scaleY, offsetY. Scale is a percentage (0.5 = 50% of parent). Offset is exact pixels."},
    {t:"teach",title:"Centering with AnchorPoint",body:"By default, Position refers to the top-left corner of the element. Set AnchorPoint to (0.5, 0.5) and Position refers to the center instead. This makes centering on any screen size easy.\n\nYou'll position HUD elements in the Custom HUD lab.",code:'local label = Instance.new("TextLabel")\nlabel.Size = UDim2.new(0, 200, 0, 50)\n-- 200px wide, 50px tall\n\nlabel.Position = UDim2.new(0.5, 0, 0.5, 0)\n-- centered horizontally and vertically\n\nlabel.AnchorPoint = Vector2.new(0.5, 0.5)'},

  "7-3":[
    {t:"teach",title:"Dynamic Health Bars",body:"A health bar is two Frames stacked: a background (red) and a foreground (green). When health drops, resize the green Frame to match the health percentage. 75 out of 100 health? Green bar fills 75%."},
    {t:"teach",title:"The Scale Trick",body:"Divide current health by max health to get a ratio between 0 and 1. Set the green bar's width scale to that ratio. The bar shrinks and grows automatically.\n\nYou'll build a live health bar in the Custom HUD lab.",code:'local maxHealth = 100\nlocal currentHealth = 75\n\nlocal ratio = currentHealth / maxHealth\ngreenBar.Size = UDim2.new(ratio, 0, 1, 0)\n-- width = 75%, height = full'},
  ],
  "7-4":[
    {t:"teach",title:"Smooth Animations",body:"A notification slides in from the right, pauses, then slides out. Instant jumps look cheap. TweenService moves a property smoothly from one value to another over time."},
    {t:"teach",title:"Creating a Tween",body:"Three inputs: the object to animate, the timing info (duration and easing style), and the target properties (where it ends up). Call :Play() to start.\n\nYou'll tween notification popups in the Custom HUD lab.",code:'local TweenService = game:GetService("TweenService")\n\nlocal tween = TweenService:Create(\n  myFrame,\n  TweenInfo.new(0.5),  -- half second\n  {Position = UDim2.new(1, 0, 0, 0)}\n)\ntween:Play()'},

  // ========== UNIT 9: CLIENT-SERVER ==========
  "8-0":[
    {t:"teach",title:"Why the Server Rules",body:"If the player's device controls their own coins, a hacker adds 99,999 in seconds. The server is the authority. It runs the real game state. Each player's device (the client) shows the game and sends inputs. The server decides what's valid."},
    {t:"teach",title:"RemoteEvents Bridge the Gap",body:"RemoteEvents are the communication channel between client and server. They live in ReplicatedStorage so both sides can see them. The client fires a message, the server receives and validates it.\n\nYou'll build secure communication for the Full Mini-Game lab.",code:'-- Client (LocalScript) fires:\nremote:FireServer("Sword", 100)\n\n-- Server (Script) receives:\nremote.OnServerEvent:Connect(function(player, item, price)\n  -- player is added automatically\n  -- validate and process the purchase\nend)'},
  ],
  "8-1":[
    {t:"teach",title:"Sending Data to the Server",body:"Player clicks 'Buy Sword' in the shop GUI. The LocalScript calls :FireServer() with the item name and price. The server's OnServerEvent handler receives the data plus the Player object automatically. You never send the Player yourself."},
    {t:"teach",title:"The Player Comes Free",body:"The server always knows which player fired the event. This prevents impersonation: a hacker can't pretend to be another player.\n\nYou'll fire purchase requests in the Full Mini-Game lab.",code:'-- CLIENT (LocalScript)\nlocal remote = game.ReplicatedStorage:WaitForChild("BuyItem")\nremote:FireServer("Sword", 100)\n\n-- SERVER (Script)\nremote.OnServerEvent:Connect(function(player, item, price)\n  print(`{player.Name} wants to buy {item}`)\nend)'},
  ],
  "8-2":[
    {t:"teach",title:"Server Talking to Clients",body:":FireClient(player, data) sends a message to one specific player. :FireAllClients(data) sends to everyone. The client listens with OnClientEvent. This is how you push notifications, round updates, and score changes."},
    {t:"teach",title:"One Player vs All Players",body:"Use FireClient for personal messages ('You leveled up!'). Use FireAllClients for global announcements ('Round starting!').\n\nYou'll send round notifications in the Full Mini-Game lab.",code:'-- SERVER\nremote:FireClient(player, "You leveled up!")\nremote:FireAllClients("Round 2 starting!")\n\n-- CLIENT (LocalScript)\nremote.OnClientEvent:Connect(function(message)\n  print(message)\nend)'},
  ],
  "8-3":[
    {t:"teach",title:"Never Trust the Client",body:"This is the most important rule in Roblox networking. Exploiters can send any data through RemoteEvents: fake item names, negative prices, impossible values. The server must validate everything before acting on it."},
    {t:"teach",title:"Validation Pattern",body:"Always check: Is the data the right type? Is the value in a valid range? Does this player actually have permission? Reject anything suspicious. Use typeof() for Roblox-specific type checking (it returns 'Instance', 'Vector3' etc.) instead of type() which only returns basic Lua types.\n\nYou'll build server validation for the Full Mini-Game lab.",code:'remote.OnServerEvent:Connect(function(player, itemName)\n  -- Check type (typeof for Roblox types)\n  if typeof(itemName) ~= "string" then return end\n  -- Check content\n  if itemName == "" then return end\n  -- Check game logic\n  if not shopItems[itemName] then return end\n  -- NOW process it\n  processPurchase(player, itemName)\nend)'},
  ],
  "8-4":[
    {t:"teach",title:"What Runs Where",body:"Scripts run on the server. LocalScripts run on the client (the player's device). ModuleScripts run wherever they are required from. Knowing which is which determines what your code can access and how secure it is."},
    {t:"teach",title:"The Rule of Authority",body:"Game logic (scoring, damage, purchases, data saving) belongs on the server where players can't tamper with it. Visual things (UI updates, camera effects, particles) go on the client because they don't affect game state.\n\nYou'll split logic between client and server in the Full Mini-Game lab.",code:'-- SERVER Script:\n-- Scoring, item purchases, data saving\n-- Secure: players cannot modify\n\n-- CLIENT LocalScript:\n-- UI updates, animations, input handling\n-- Fast and responsive, but not trusted\n\n-- The server is the source of truth'},
  ],

  // ========== UNIT 10: DATA & SYSTEMS ==========
  "9-0":[
    {t:"teach",title:"Saving Player Progress",body:"A player earns 500 coins today. They leave and come back tomorrow. Without DataStores, the coins are gone. DataStoreService saves data between game sessions so progress persists."},
    {t:"teach",title:"SetAsync and GetAsync",body:":SetAsync(key, value) saves data. :GetAsync(key) loads it. Use the player's UserId as the key so each player's data is separate. Both operations go over the network, so they can fail. Always wrap them in pcall.\n\nYou'll save player stats in the Full Mini-Game lab.",code:'local DSS = game:GetService("DataStoreService")\nlocal store = DSS:GetDataStore("PlayerData")\n\n-- Save\nstore:SetAsync("player_123", {coins = 500})\n\n-- Load\nlocal data = store:GetAsync("player_123")\nprint(data.coins)  -- 500'},
  ],
  "9-1":[
    {t:"teach",title:"Code That Lives in One Place",body:"Three scripts all need the same damage formula. Copy-paste works until you fix a bug in one copy and forget the other two. A ModuleScript holds the formula once. Every script requires it."},
    {t:"teach",title:"The Module Pattern",body:"Create the module table, attach functions to it, return the table. Any script that requires the module gets access to everything inside.\n\nYou'll organize game logic into modules for the Full Mini-Game lab.",code:'-- ModuleScript named "GameUtils"\nlocal M = {}\n\nfunction M.double(n)\n  return n * 2\nend\n\nfunction M.clamp(val, min, max)\n  return math.max(min, math.min(max, val))\nend\n\nreturn M\n\n-- In another script:\nlocal Utils = require(path.To.GameUtils)\nprint(Utils.double(5))  -- 10'},
  ],
  "9-2":[
    {t:"teach",title:"Catching Errors Before They Crash",body:"DataStore calls go over the network. Networks fail. API limits throttle requests. Without protection, one failure crashes the entire script and the player loses their session. pcall runs code safely."},
    {t:"teach",title:"The pcall Pattern",body:"pcall returns two values: a boolean (did it succeed?) and the result or error message. Check the boolean before using the result.\n\nYou'll wrap all DataStore calls in pcall for the Full Mini-Game lab.",code:'local success, result = pcall(function()\n  return store:GetAsync("player_123")\nend)\n\nif success then\n  print("Data loaded:", result)\nelse\n  warn("Failed:", result)\nend'},
  ],
  "9-3":[
    {t:"teach",title:"Building Reusable Templates",body:"Your game has cars, enemies, and items. Each one has data (speed, health, price) and behavior (drive, attack, equip). Object-Oriented Programming organizes them into reusable templates using tables and metatables."},
    {t:"teach",title:"The Constructor Pattern",body:".new() creates a new table (the instance), fills it with data, and connects it to the class using setmetatable. The colon : syntax automatically passes 'self' so methods can access instance data.\n\nYou'll build enemy classes for the Full Mini-Game lab.",code:'local Enemy = {}\nEnemy.__index = Enemy\n\nfunction Enemy.new(name, health)\n  local self = setmetatable({}, Enemy)\n  self.name = name\n  self.health = health\n  return self\nend\n\nfunction Enemy:takeDamage(amount)\n  self.health -= amount\n  print(`{self.name}: {self.health} HP left`)\nend'},
  ],
  "9-4":[
    {t:"teach",title:"Round-Based Game Loops",body:"Lobby, countdown, gameplay, results, repeat. Most Roblox games follow this cycle. task.wait(seconds) pauses the current thread without freezing the whole game. RunService.Heartbeat runs code every single frame."},
    {t:"teach",title:"Building a Round System",body:"The game loop runs in a server Script. Each phase updates a status display that all players see. task.wait() handles timing between phases.\n\nYou'll build the full round system in the Full Mini-Game lab.",code:'local status = game.ReplicatedStorage.Status\n\nwhile true do\n  status.Value = "Waiting for players..."\n  task.wait(10)\n  status.Value = "Round starting!"\n  task.wait(3)\n  status.Value = "60 seconds remaining"\n  task.wait(60)\n  status.Value = "Round over!"\n  task.wait(5)\nend'},
  ],
};

const MAX_HEARTS = 3;
const XP_PER_CORRECT = 10;
const XP_BONUS_PERFECT = 15;

// ============================================================
//  STATE
// ============================================================
let state = {
  xp: 0,
  streak: 0,
  lastDate: null,
  completed: {},
  labs: {},
  accuracy: {},   // {unitIdx: {right: N, wrong: N}}
  mistakes: [],   // [{ui, li, qi}] questions answered wrong
};

let lessonState = null; // active lesson

function normalizeState(s) {
  // Clamp numeric values to safe ranges (NaN guard: typeof NaN === "number")
  let xp = typeof s.xp === "number" && !Number.isNaN(s.xp) ? Math.max(0, Math.min(Math.floor(s.xp), 100000)) : 0;
  let streak = typeof s.streak === "number" && !Number.isNaN(s.streak) ? Math.max(0, Math.min(Math.floor(s.streak), 3650)) : 0;
  const lastDate = typeof s.lastDate === "string" && s.lastDate.length < 50 ? s.lastDate : null;

  // Validate completed keys match unit-lesson pattern
  let completed = {};
  if (s.completed && typeof s.completed === "object" && !Array.isArray(s.completed)) {
    Object.keys(s.completed).forEach(k => {
      if (/^\d+-\d+$/.test(k)) {
        const parts = k.split("-").map(Number);
        if (parts[0] >= 0 && parts[0] < UNITS.length && parts[1] >= 0 && parts[1] < (UNITS[parts[0]]?.lessons?.length || 0)) {
          completed[k] = true;
        }
      }
    });
  }

  // Validate labs keys
  let labs = {};
  if (s.labs && typeof s.labs === "object" && !Array.isArray(s.labs)) {
    const validLabIds = LABS.map(l => l.id);
    Object.keys(s.labs).forEach(k => {
      if (validLabIds.includes(k) && typeof s.labs[k] === "object") {
        const labDef = LABS.find(l => l.id === k);
        labs[k] = {};
        Object.keys(s.labs[k]).forEach(sk => {
          if (/^\d+$/.test(sk) && Number(sk) < labDef.steps.length) {
            labs[k][sk] = !!s.labs[k][sk];
          }
        });
      }
    });
  }

  // Validate accuracy keys and values
  let accuracy = {};
  if (s.accuracy && typeof s.accuracy === "object" && !Array.isArray(s.accuracy)) {
    Object.keys(s.accuracy).forEach(k => {
      if (/^\d+$/.test(k) && Number(k) < UNITS.length) {
        const a = s.accuracy[k];
        if (a && typeof a === "object") {
          accuracy[k] = {
            right: typeof a.right === "number" && !Number.isNaN(a.right) ? Math.max(0, Math.floor(a.right)) : 0,
            wrong: typeof a.wrong === "number" && !Number.isNaN(a.wrong) ? Math.max(0, Math.floor(a.wrong)) : 0,
          };
        }
      }
    });
  }

  // Validate mistakes reference real questions
  let mistakes = [];
  if (Array.isArray(s.mistakes)) {
    mistakes = s.mistakes.filter(m => {
      if (!m || typeof m.key !== "string") return false;
      if (typeof m.ui !== "number" || typeof m.li !== "number" || typeof m.qi !== "number") return false;
      const unit = UNITS[m.ui];
      if (!unit) return false;
      const lesson = unit.lessons[m.li];
      if (!lesson) return false;
      if (m.qi < 0 || m.qi >= lesson.questions.length) return false;
      const expectedKey = `${m.ui}-${m.li}-${m.qi}`;
      if (m.key !== expectedKey) return false;
      return true;
    });
  }

  return { xp, streak, lastDate, completed, labs, accuracy, mistakes, schemaVersion: 1 };
}

function mergeState(current, imported) {
  const c = normalizeState(current || {});
  const i = normalizeState(imported || {});
  const merged = normalizeState({});

  merged.xp = Math.max(c.xp, i.xp);
  merged.streak = Math.max(c.streak, i.streak);
  merged.completed = { ...c.completed, ...i.completed };

  merged.labs = {};
  const labIds = new Set([...Object.keys(c.labs), ...Object.keys(i.labs)]);
  labIds.forEach(id => {
    const cLab = c.labs[id] || {};
    const iLab = i.labs[id] || {};
    const stepKeys = new Set([...Object.keys(cLab), ...Object.keys(iLab)]);
    merged.labs[id] = {};
    stepKeys.forEach(sk => {
      merged.labs[id][sk] = !!(cLab[sk] || iLab[sk]);
    });
  });

  const accKeys = new Set([...Object.keys(c.accuracy), ...Object.keys(i.accuracy)]);
  merged.accuracy = {};
  accKeys.forEach(k => {
    merged.accuracy[k] = {
      right: Math.max(c.accuracy[k]?.right || 0, i.accuracy[k]?.right || 0),
      wrong: Math.max(c.accuracy[k]?.wrong || 0, i.accuracy[k]?.wrong || 0),
    };
  });

  const mistakeMap = new Map();
  [...c.mistakes, ...i.mistakes].forEach(m => mistakeMap.set(m.key, m));
  merged.mistakes = [...mistakeMap.values()];

  if (c.lastDate && i.lastDate) {
    merged.lastDate = new Date(c.lastDate) > new Date(i.lastDate) ? c.lastDate : i.lastDate;
  } else {
    merged.lastDate = c.lastDate || i.lastDate || null;
  }

  return normalizeState(merged);
}

function load() {
  try {
    const d = localStorage.getItem("luau-duo-v2");
    if (d) state = normalizeState({ ...state, ...JSON.parse(d) });
  } catch(e) {}
  updateStreak();
}
function save() {
  try {
    localStorage.setItem("luau-duo-v2", JSON.stringify(state));
  } catch(e) {
    if (e.name === "QuotaExceededError" || e.code === 22) {
      showSaveWarning("Storage full. Your progress may not save. Export a backup from ⚙️ Settings.");
    }
  }
}
function showSaveWarning(msg) {
  const banner = document.getElementById("saveWarning");
  if (!banner) return;
  banner.textContent = msg;
  banner.classList.remove("hidden");
}
function updateStreak() {
  const today = new Date().toDateString();
  if (state.lastDate === today) return;
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (state.lastDate !== yesterday && state.lastDate !== null) {
    state.streak = 0;
    save();
  }
}
function markToday() {
  const today = new Date().toDateString();
  if (state.lastDate === today) return;
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (state.lastDate === yesterday || state.lastDate === null) {
    state.streak++;
  } else {
    state.streak = 1;
  }
  state.lastDate = today;
  save();
}

// ============================================================
//  UTILITY
// ============================================================
function isLessonUnlocked(unitIdx, lessonIdx) {
  if (unitIdx === 0 && lessonIdx === 0) return true;
  if (lessonIdx > 0) return !!state.completed[`${unitIdx}-${lessonIdx - 1}`];
  return !!state.completed[`${unitIdx - 1}-${UNITS[unitIdx - 1].lessons.length - 1}`];
}
function isLessonDone(ui, li) { return !!state.completed[`${ui}-${li}`]; }

// ============================================================
//  RENDER PATH MAP
// ============================================================
function renderMap() {
  document.getElementById("streakNum").textContent = state.streak;
  document.getElementById("xpNum").textContent = state.xp;
  document.getElementById("topbar").style.display = "flex";

  const wrap = document.getElementById("pathWrap");
  wrap.innerHTML = "";

  const offsets = [0, -50, 0, 50, 0]; // px horizontal wobble

  UNITS.forEach((unit, ui) => {
    const hdr = document.createElement("div");
    hdr.className = "unit-header";
    hdr.innerHTML = `<div class="unit-badge" style="background:${unit.color}">${unit.title}</div><div class="unit-sub">${unit.sub}</div>`;
    wrap.appendChild(hdr);

    const nodes = document.createElement("div");
    nodes.className = "path-nodes";

    unit.lessons.forEach((lesson, li) => {
      const key = `${ui}-${li}`;
      const done = isLessonDone(ui, li);
      const unlocked = isLessonUnlocked(ui, li);
      const isCurrent = unlocked && !done;

      const row = document.createElement("div");
      row.className = "node-row";
      const offset = offsets[li % offsets.length];
      row.style.transform = `translateX(${offset}px)`;

      const btn = document.createElement("button");
      let cls = "node";
      if (!unlocked) cls += " node-locked";
      else if (done) cls += " node-done";
      if (isCurrent) cls += " node-current";
      btn.className = cls;

      if (!unlocked) {
        btn.style.background = "#2A4266";
        btn.innerHTML = '<span class="lock-icon">🔒</span>';
      } else {
        btn.style.background = unit.color;
        btn.style.boxShadow = `0 6px 0 ${unit.color}88`;
        btn.innerHTML = done
          ? `⭐<span class="node-check" style="color:${unit.color}">✓</span>`
          : `${li + 1}`;
        btn.onclick = () => startLesson(ui, li);
      }

      row.appendChild(btn);
      nodes.appendChild(row);

      if (li < unit.lessons.length - 1) {
        const line = document.createElement("div");
        line.className = "path-line";
        line.style.background = isLessonDone(ui, li) ? unit.color : "#2A4266";
        nodes.appendChild(line);
      }
    });

    wrap.appendChild(nodes);

    // Unit number (1-indexed) for labs and challenges
    const unitNum = ui + 1;

    // Challenge node for this unit
    const challenge = CHALLENGES.find(c => c.unit === unitNum);
    if (challenge) {
      const unitDone = isUnitComplete(ui);
      const chRow = document.createElement("div");
      chRow.className = "lab-row";
      const chBtn = document.createElement("button");
      chBtn.className = "challenge-node";
      chBtn.innerHTML = `<span>💡</span><span>${challenge.title}</span>`;
      chBtn.onclick = () => openChallenge(ui);
      chRow.appendChild(chBtn);
      wrap.appendChild(chRow);
    }

    // Check for labs placed after this unit
    LABS.filter(lab => lab.mapPosition === unitNum).forEach(lab => {
      const labSteps = state.labs[lab.id] || {};
      const stepsCompleted = lab.steps.filter((_, si) => labSteps[si]).length;
      const allStepsDone = stepsCompleted === lab.steps.length;
      const relevantDone = lab.usesUnits.filter(u => isUnitComplete(u - 1)).length;
      const allSkillsReady = relevantDone === lab.usesUnits.length;

      const labRow = document.createElement("div");
      labRow.className = "lab-row";

      const labNode = document.createElement("button");
      labNode.className = "lab-node unlocked";
      labNode.style.borderColor = allStepsDone ? "#58CC02" : allSkillsReady ? unit.color : "#FFD900";
      labNode.style.color = "#fff";
      labNode.onclick = () => openLab(lab.id);

      const skillTag = allSkillsReady
        ? '<span class="lab-ready-tag">READY</span>'
        : `<span class="lab-skill-tag">${relevantDone}/${lab.usesUnits.length} units</span>`;

      labNode.innerHTML = `
        <span class="lab-icon">${lab.icon}</span>
        <span class="lab-title">${lab.title}</span>
        ${skillTag}
        <span class="lab-progress">${allStepsDone ? "✅" : stepsCompleted + "/" + lab.steps.length}</span>`;

      labRow.appendChild(labNode);
      wrap.appendChild(labRow);
    });
  });
}

function isUnitComplete(unitIdx) {
  const unit = UNITS[unitIdx];
  return unit.lessons.every((_, li) => isLessonDone(unitIdx, li));
}

// ============================================================
//  LESSON ENGINE
// ============================================================
function startLesson(ui, li) {
  const unit = UNITS[ui];
  const lesson = unit.lessons[li];
  const intros = LESSON_INTROS[`${ui}-${li}`] || [];
  lessonState = {
    ui, li, unit, lesson,
    questions: [...intros, ...lesson.questions],
    current: 0,
    hearts: MAX_HEARTS,
    correctCount: 0,
    answered: false,
    selected: null,
    introCount: intros.length,
  };
  document.getElementById("lessonScreen").classList.add("active");
  document.documentElement.style.setProperty('--unit-color', unit.color);
  document.documentElement.style.setProperty('--unit-glow', unit.color + '50');
  document.documentElement.style.setProperty('--unit-tint', unit.color + '18');
  document.getElementById("topbar").style.display = "none";
  document.getElementById("bottomNav").classList.add("hidden");
  renderQuestion();
}

function closeLesson() {
  document.getElementById("lessonScreen").classList.remove("active");
  document.getElementById("topbar").style.display = "flex";
  document.getElementById("bottomNav").classList.remove("hidden");
  lessonState = null;
  renderMap();
  updateReviewBadge();
}

function renderQuestion() {
  const ls = lessonState;
  if (!ls) return;
  const q = ls.questions[ls.current];
  ls.answered = false;
  ls.selected = null;

  // Progress
  document.getElementById("lessonProgress").style.width =
    `${(ls.current / ls.questions.length) * 100}%`;

  // Hearts
  const heartsEl = document.getElementById("lessonHearts");
  heartsEl.innerHTML = "";
  for (let i = 0; i < MAX_HEARTS; i++) {
    heartsEl.innerHTML += i < ls.hearts ? "❤️" : "🤍";
  }

  // Feedback
  const fb = document.getElementById("feedbackBanner");
  fb.classList.remove("show", "correct", "wrong");

  // Check button
  const btn = document.getElementById("checkBtn");
  btn.textContent = "Check";
  btn.className = "check-btn disabled";
  btn.disabled = true;

  const body = document.getElementById("lessonBody");
  body.scrollTop = 0;

  if (q.t === "teach") renderTeach(body, q);
  else if (q.t === "mc") renderMC(body, q);
  else if (q.t === "fill") renderFill(body, q);
  else if (q.t === "order") renderOrder(body, q);
}

function renderTeach(body, q) {
  body.innerHTML = `
    <div class="teach-card">
      <div class="teach-badge">Learn</div>
      <div class="teach-title">${escHtml(q.title)}</div>
      <div class="teach-body">${escHtml(q.body)}</div>
      ${q.code ? '<code class="teach-code">' + escHtml(q.code) + '</code>' : ''}
    </div>`;
  // Enable check button as "Got it"
  const btn = document.getElementById("checkBtn");
  btn.textContent = "Got it →";
  btn.className = "check-btn ready";
  btn.disabled = false;
}

function renderMC(body, q) {
  body.innerHTML = `
    <div class="q-prompt">${escHtml(q.q)}</div>
    <div class="mc-options">${q.o.map((opt, i) => `
      <button class="mc-btn" data-idx="${i}" onclick="selectMC(this, ${i})">
        ${formatOption(opt)}
      </button>`).join("")}
    </div>`;
}

function formatOption(text) {
  return escHtml(text).replace(/`([^`]+)`/g, "<code>$1</code>");
}

function selectMC(el, idx) {
  if (lessonState.answered) return;
  sfxTap();
  document.querySelectorAll(".mc-btn").forEach(b => b.classList.remove("selected"));
  el.classList.add("selected");
  lessonState.selected = idx;
  enableCheck();
}

function renderFill(body, q) {
  const parts = q.code.split("___");
  body.innerHTML = `
    <div class="q-prompt">${escHtml(q.q)}</div>
    <div class="q-code-block">${escHtml(parts[0])}<span class="q-blank" id="blankDisplay">&nbsp;</span>${escHtml(parts[1] || "")}</div>
    <div class="fill-input-wrap">
      <input class="fill-input" id="fillInput" type="text" placeholder="Type your answer..." autocomplete="off" autocapitalize="off" spellcheck="false">
    </div>`;
  const input = document.getElementById("fillInput");
  input.addEventListener("input", () => {
    const v = input.value.trim();
    document.getElementById("blankDisplay").textContent = v || "\u00A0";
    lessonState.selected = v;
    if (v) enableCheck(); else disableCheck();
  });
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      const v = input.value.trim();
      if (v) { lessonState.selected = v; handleCheck(); }
    }
  });
  setTimeout(() => input.focus(), 100);
}

function renderOrder(body, q) {
  const shuffled = [...q.blocks].map((b, i) => ({ text: b, origIdx: i }));
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }

  body.innerHTML = `
    <div class="q-prompt">${escHtml(q.q)}</div>
    <div class="order-answer-label">YOUR ANSWER:</div>
    <div class="order-answer" id="orderAnswer"></div>
    <div class="order-bank" id="orderBank">
      ${shuffled.map((b, i) => `<button class="block" data-bank="${i}" data-orig="${b.origIdx}" onclick="pickBlock(this)">${escHtml(b.text)}</button>`).join("")}
    </div>`;
  lessonState.selected = [];
}

function pickBlock(el) {
  if (lessonState.answered) return;
  const ls = lessonState;

  if (el.parentElement.id === "orderAnswer") {
    // Remove from answer
    el.classList.remove("in-answer");
    document.getElementById("orderBank").appendChild(el);
    ls.selected = ls.selected.filter(i => i !== parseInt(el.dataset.orig));
  } else {
    // Add to answer
    el.classList.add("in-answer");
    document.getElementById("orderAnswer").appendChild(el);
    ls.selected.push(parseInt(el.dataset.orig));
  }

  if (ls.selected.length === ls.questions[ls.current].blocks.length) enableCheck();
  else disableCheck();
}

function enableCheck() {
  const btn = document.getElementById("checkBtn");
  btn.className = "check-btn ready";
  btn.disabled = false;
}
function disableCheck() {
  const btn = document.getElementById("checkBtn");
  btn.className = "check-btn disabled";
  btn.disabled = true;
}

function handleCheck() {
  const ls = lessonState;
  if (!ls) return;
  const btn = document.getElementById("checkBtn");
  if (btn.disabled) return;

  if (ls.answered) {
    // Next question
    if (ls.hearts <= 0) {
      showComplete(false);
      return;
    }
    ls.current++;
    if (ls.current >= ls.questions.length) {
      showComplete(true);
      return;
    }
    renderQuestion();
    return;
  }

  if (btn.classList.contains("disabled")) return;
  btn.disabled = true;

  const q = ls.questions[ls.current];

  // Teach cards: just advance, no grading
  if (q.t === "teach") {
    document.getElementById("lessonProgress").style.width =
      `${((ls.current + 1) / ls.questions.length) * 100}%`;
    ls.current++;
    if (ls.current >= ls.questions.length) {
      showComplete(true);
      return;
    }
    renderQuestion();
    return;
  }

  let correct = false;

  if (q.t === "mc") {
    correct = ls.selected === q.a;
    document.querySelectorAll(".mc-btn").forEach(b => {
      const idx = parseInt(b.dataset.idx);
      if (idx === q.a) b.classList.add("correct");
      else if (idx === ls.selected) b.classList.add("wrong");
      b.style.pointerEvents = "none";
    });
  } else if (q.t === "fill") {
    const input = document.getElementById("fillInput");
    const answer = (ls.selected || "").trim();
    const expected = q.a.trim();
    correct = q.caseSensitive ? (answer === expected) : (answer === expected || answer.toLowerCase() === expected.toLowerCase());
    input.classList.add(correct ? "correct" : "wrong");
    input.disabled = true;
    if (!correct) {
      document.getElementById("blankDisplay").textContent = expected;
    }
  } else if (q.t === "order") {
    const expected = q.blocks.map((_, i) => i);
    correct = JSON.stringify(ls.selected) === JSON.stringify(expected);
    document.querySelectorAll("#orderAnswer .block").forEach(b => {
      b.style.borderColor = correct ? "#58CC02" : "#FF4B4B";
      b.style.pointerEvents = "none";
    });
    document.querySelectorAll("#orderBank .block").forEach(b => {
      b.style.pointerEvents = "none";
    });
  }

  ls.answered = true;

  // Update progress bar to reflect answered question
  document.getElementById("lessonProgress").style.width =
    `${((ls.current + 1) / ls.questions.length) * 100}%`;

  if (correct) {
    ls.correctCount++;
    sfxCorrect();
    // Clear from mistake queue if answered correctly during replay
    const qi = ls.current - (ls.introCount || 0);
    const mKey = `${ls.ui}-${ls.li}-${qi}`;
    state.mistakes = state.mistakes.filter(m => m.key !== mKey);
  } else {
    ls.hearts--;
    sfxWrong();
    // Update hearts display
    const heartsEl = document.getElementById("lessonHearts");
    heartsEl.innerHTML = "";
    for (let i = 0; i < MAX_HEARTS; i++) {
      heartsEl.innerHTML += i < ls.hearts ? "❤️" : "🤍";
    }
  }

  // Track accuracy and mistakes
  if (!state.accuracy[ls.ui]) state.accuracy[ls.ui] = {right:0, wrong:0};
  if (correct) {
    state.accuracy[ls.ui].right++;
  } else {
    state.accuracy[ls.ui].wrong++;
    const qi = ls.current - (ls.introCount || 0);
    const mKey = `${ls.ui}-${ls.li}-${qi}`;
    if (!state.mistakes.some(m => m.key === mKey)) {
      state.mistakes.push({key: mKey, ui: ls.ui, li: ls.li, qi: qi});
    }
  }
  save();

  // Feedback banner
  const fb = document.getElementById("feedbackBanner");
  fb.classList.add("show", correct ? "correct" : "wrong");
  document.getElementById("fbTitle").textContent = correct ? "Correct!" : "Correct answer:";
  document.getElementById("fbTitle").className = "fb-title " + (correct ? "correct" : "wrong");
  document.getElementById("fbExplain").textContent = q.e;

  // Button becomes continue
  btn.textContent = ls.hearts <= 0 ? "See Results" : "Continue";
  btn.className = "check-btn " + (correct ? "next-correct" : "next-wrong");
  btn.disabled = false;
}

// ============================================================
//  COMPLETE / FAIL SCREEN
// ============================================================
function showComplete(passed) {
  document.getElementById("lessonScreen").classList.remove("active");
  document.getElementById("bottomNav").classList.add("hidden");
  const ls = lessonState;

  const screen = document.getElementById("completeScreen");
  screen.classList.add("active");

  const icon = document.getElementById("completeIcon");
  const title = document.getElementById("completeTitle");
  const sub = document.getElementById("completeSub");
  const xpEl = document.getElementById("xpEarned");
  const stats = document.getElementById("completeStats");

  if (passed) {
    const key = `${ls.ui}-${ls.li}`;
    const alreadyDone = !!state.completed[key];
    const perfect = ls.hearts === MAX_HEARTS;
    const xpGain = alreadyDone ? 0 : ls.correctCount * XP_PER_CORRECT + (perfect ? XP_BONUS_PERFECT : 0);
    if (!alreadyDone) {
      state.xp += xpGain;
      state.completed[key] = true;
    }
    markToday();
    save();
    sfxComplete();
    if (xpGain > 0) setTimeout(sfxXP, 500);

    icon.textContent = perfect ? "🏆" : "🎉";
    title.textContent = perfect ? "Perfect!" : "Lesson Complete!";
    title.className = "complete-title";
    sub.textContent = ls.lesson.title;
    xpEl.textContent = "+" + xpGain;

    stats.innerHTML = `
      <div class="c-stat"><div class="c-stat-val" style="color:#58CC02">${ls.correctCount}/${ls.lesson.questions.length}</div><div class="c-stat-lbl">Correct</div></div>
      <div class="c-stat"><div class="c-stat-val" style="color:#FF4B4B">${"❤️".repeat(ls.hearts)}</div><div class="c-stat-lbl">Hearts</div></div>
      <div class="c-stat"><div class="c-stat-val" style="color:#FF9600">🔥 ${state.streak}</div><div class="c-stat-lbl">Streak</div></div>`;

    fireConfetti();
  } else {
    icon.textContent = "😤";
    icon.className = "fail-icon";
    title.textContent = "Out of hearts!";
    title.className = "complete-title fail-title";
    sub.textContent = "No worries — try again!";
    xpEl.textContent = "+0";
    stats.innerHTML = `
      <div class="c-stat"><div class="c-stat-val" style="color:#58CC02">${ls.correctCount}/${ls.lesson.questions.length}</div><div class="c-stat-lbl">Correct</div></div>`;
  }
}

function closeComplete() {
  document.getElementById("completeScreen").classList.remove("active");
  document.getElementById("completeIcon").className = "complete-icon";
  document.getElementById("bottomNav").classList.remove("hidden");
  lessonState = null;
  renderMap();
  updateReviewBadge();
}

// ============================================================
//  CONFETTI
// ============================================================
function fireConfetti() {
  const wrap = document.getElementById("confettiWrap");
  wrap.innerHTML = "";
  const colors = ["#58CC02","#FFD900","#1CB0F6","#FF4B4B","#CE82FF","#FF9600"];
  for (let i = 0; i < 50; i++) {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "%";
    c.style.top = -10 + "px";
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDelay = Math.random() * 0.8 + "s";
    c.style.animationDuration = (1 + Math.random()) + "s";
    c.style.width = (6 + Math.random() * 8) + "px";
    c.style.height = (6 + Math.random() * 8) + "px";
    wrap.appendChild(c);
  }
  setTimeout(() => wrap.innerHTML = "", 3000);
}
